# =============================================
#  Baydrogo Blog — Jekyll Konfigürasyonu
# =============================================

title: "Baydrogo"
description: "Kişisel blog"
author: "Baydrogo"

url: "https://baydrogo.com"
baseurl: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: /:title/

lang: tr
timezone: Europe/Istanbul

markdown: kramdown
highlighter: rouge

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .obsidian
  - README.md
  - scripts/
