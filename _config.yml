# =============================================
#  Baydrogo Blog — Jekyll Konfigürasyonu
# =============================================

# Site Bilgileri
title: "Baydrogo"
tagline: "Kişisel blog"
description: "Kişisel blog"
author: "Drogo"

# Domain ayarı
url: "https://baydrogo.com"
baseurl: ""

# jekyllBear teması
remote_theme: knhash/jekyllBear

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# Permalink yapısı
permalink: /:title/

# Dil ve zaman dilimi
lang: tr
timezone: Europe/Istanbul

# Markdown ayarları
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Varsayılan front matter
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# Hariç tutulacak dosyalar
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .obsidian
  - README.md
  - scripts/

# jekyllBear tema ayarları
show_description: true
show_image: false
show_related: true
