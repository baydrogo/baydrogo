---
layout: default
---

<div class="home">
  {% if site.description %}
    <p class="site-description">{{ site.description }}</p>
  {% endif %}

  <div class="post-list">
    {% for post in site.posts %}
      <div class="post-row">
        <span class="post-date">{{ post.date | date: "%d.%m.%Y" }}</span>
        <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </div>
    {% endfor %}
  </div>
</div>
